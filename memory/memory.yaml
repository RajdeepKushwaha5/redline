# Memory Configuration

layers:
  - name: working
    path: MEMORY.md
    max_lines: 200
    format: markdown
  - name: archive
    path: archive/
    format: yaml
    rotation: monthly

update_triggers:
  - on_session_end
  - on_explicit_save

archive_policy:
  max_entries: 1000
  compress_after: 90d

mode: append-only

retention:
  period: 7 years
  reason: Regulatory compliance audit trail

schema:
  entry_fields:
    - timestamp     # ISO 8601 UTC
    - action        # gap-analysis | draft | review | compliance-check | audit
    - actor         # agent name (drafter, reviewer, compliance-checker, auditor)
    - sod_role      # maker | checker | executor | auditor
    - policy        # path to policy file
    - framework     # gdpr | soc2
    - outcome       # result summary
    - sod_verified  # true | false
    - details       # freeform notes
