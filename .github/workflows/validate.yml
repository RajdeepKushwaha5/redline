name: Policy Compliance CI

on:
  push:
    branches: [main]
    paths:
      - 'policies/**'
      - 'agent.yaml'
      - 'skills/**'
      - 'knowledge/**'
      - 'tools/**'
      - 'hooks/**'
      - 'agents/**'
      - 'workflows/**'
      - 'compliance/**'
      - 'SOUL.md'
      - 'RULES.md'
      - 'DUTIES.md'
      - 'AGENTS.md'
  pull_request:
    branches: [main]

jobs:
  validate-agent:
    name: Validate Agent Spec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate gitagent spec
        run: npx gitagent validate --compliance --dir .

      - name: Print agent info
        run: npx gitagent info --dir .

  validate-policies:
    name: Check Policy Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all policies have version headers
        run: |
          echo "Checking policy version headers..."
          MISSING=0
          for f in policies/*.md; do
            ERRORS=""
            for field in "Version:" "Effective Date:" "Owner:" "Approved By:"; do
              if ! grep -q "$field" "$f"; then
                ERRORS="$ERRORS $field"
              fi
            done
            if [ -n "$ERRORS" ]; then
              echo "❌ $f missing:$ERRORS"
              MISSING=$((MISSING+1))
            else
              echo "✅ $f"
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo ""
            echo "ERROR: $MISSING policy file(s) with incomplete metadata."
            exit 1
          fi
          echo ""
          echo "All policies have required metadata headers."

      - name: Check knowledge framework checklists exist
        run: |
          echo "Checking framework checklists..."
          for FRAMEWORK in gdpr soc2; do
            CHECKLIST="knowledge/frameworks/$FRAMEWORK/checklist.md"
            REQUIREMENTS="knowledge/frameworks/$FRAMEWORK/requirements.md"
            if [ ! -f "$CHECKLIST" ]; then
              echo "❌ Missing: $CHECKLIST"
              exit 1
            fi
            if [ ! -f "$REQUIREMENTS" ]; then
              echo "❌ Missing: $REQUIREMENTS"
              exit 1
            fi
            echo "✅ $FRAMEWORK: checklist + requirements present"
          done

      - name: Run policy-scanner tool
        run: echo '{}' | node tools/policy-scanner.js

      - name: Validate hook scripts exist
        run: |
          for hook in hooks/load-policies.js hooks/validate-metadata.js hooks/log-error.js; do
            if [ ! -f "$hook" ]; then
              echo "❌ Missing hook: $hook"
              exit 1
            fi
            echo "✅ $hook exists"
          done
