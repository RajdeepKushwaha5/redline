spec_version: "0.1.0"
name: redline
version: 0.1.0
description: "AI-powered policy management system — multi-agent governance where policies are the git repo"
author: redline-team
license: MIT

model:
  preferred: google:gemini-2.5-flash
  fallback:
    - google:gemini-2.0-flash
  constraints:
    temperature: 0.1
    max_tokens: 8192

skills:
  - gap-analysis
  - draft-policy
  - review-policy
  - compliance-check
  - audit-report

tools: [cli, read, write, memory, policy-scanner]

agents:
  drafter:
    description: Drafts and proposes policy changes based on gap analysis
  reviewer:
    description: Reviews policy drafts for clarity, completeness, and consistency
  compliance-checker:
    description: Validates policies against regulatory frameworks
  auditor:
    description: Generates audit reports and verifies change history integrity

delegation:
  mode: explicit

runtime:
  max_turns: 50
  timeout: 300

compliance:
  risk_level: high
  data_classification: confidential
  human_in_the_loop: true
  regulatory_frameworks:
    - gdpr
    - soc2

  review:
    cadence: quarterly
    type: full
    reviewer: human

  supervision:
    review_cadence: quarterly
    human_in_the_loop: true
    escalation_triggers:
      - confidence_below: 0.7
      - action_type: policy_approval
      - action_type: compliance_certification
      - error_detected: true
    override_capability: true
    kill_switch: true

  recordkeeping:
    audit_logging: true
    log_format: structured_json
    retention_period: 7y
    retention_days: 2555
    log_contents:
      - prompts_and_responses
      - tool_calls
      - decision_pathways
      - model_version
      - timestamps
    immutable: true

  model_risk:
    validation_cadence: quarterly
    validation_type: full
    ongoing_monitoring: true
    outcomes_analysis: true
    drift_detection: true

  data_governance:
    pii_handling: redact
    data_classification: confidential
    consent_required: false
    bias_testing: false

  segregation_of_duties:
    roles:
      - id: maker
        description: Drafts and proposes policy changes
        permissions: [create, submit]
      - id: checker
        description: Reviews and approves or rejects policy drafts
        permissions: [review, approve, reject]
      - id: executor
        description: Validates approved policies against regulatory frameworks
        permissions: [validate, certify]
      - id: auditor
        description: Audits the full process and maintains compliance records
        permissions: [audit, report]

    conflicts:
      - [maker, checker]
      - [maker, auditor]
      - [executor, maker]
      - [executor, auditor]

    assignments:
      drafter: [maker]
      reviewer: [checker]
      compliance-checker: [executor]
      auditor: [auditor]

    isolation:
      state: full
      credentials: separate

    handoffs:
      - action: policy_update
        required_roles: [maker, checker, executor]
        approval_required: true
      - action: compliance_certification
        required_roles: [executor, auditor]
        approval_required: true
      - action: policy_retirement
        required_roles: [maker, checker, auditor]
        approval_required: true

    enforcement: strict

tags:
  - compliance
  - policy-management
  - governance
  - gdpr
  - soc2
  - hackathon
