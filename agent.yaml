spec_version: "0.1.0"
name: redline
version: 0.1.0
description: "AI-powered policy management system — multi-agent governance where policies are the git repo"
author: redline-team
license: MIT

model:
  preferred: google:gemini-2.5-flash
  fallback:
    - google:gemini-2.0-flash
  constraints:
    temperature: 0.1
    max_tokens: 8192

skills:
  - gap-analysis
  - draft-policy
  - review-policy
  - compliance-check
  - audit-report

tools: [policy-scanner]

agents:
  drafter:
    description: Drafts and proposes policy changes based on gap analysis
  reviewer:
    description: Reviews policy drafts for clarity, completeness, and consistency
  compliance-checker:
    description: Validates policies against regulatory frameworks
  auditor:
    description: Generates audit reports and verifies change history integrity

delegation:
  mode: explicit

runtime:
  max_turns: 50
  timeout: 300

compliance:
  risk_tier: high
  frameworks:
    - gdpr
    - soc2

  supervision:
    review_cadence: quarterly
    human_in_the_loop: always
    escalation_triggers:
      - confidence_below: 0.7
      - action_type: policy_approval
      - action_type: compliance_certification
      - error_detected: true
    override_capability: true
    kill_switch: true

  recordkeeping:
    audit_logging: true
    retention_days: 2555
    log_format: structured_json
    retention_period: 7y
    log_contents:
      - prompts_and_responses
      - tool_calls
      - decision_pathways
      - model_version
      - timestamps
    immutable: true

  model_risk:
    validation_cadence: quarterly
    validation_type: full
    ongoing_monitoring: true
    outcomes_analysis: true
    drift_detection: true

  data_governance:
    pii_handling: redact
    data_classification: confidential
    consent_required: false
    bias_testing: false

  # NOTE: segregation_of_duties is defined in DUTIES.md (canonical source)
  # and enforced by gitclaw at runtime. The gitagent schema v0.1.7 does not
  # yet include SOD in the compliance_config schema, though the spec docs do.

tags:
  - compliance
  - policy-management
  - governance
  - gdpr
  - soc2
  - hackathon
